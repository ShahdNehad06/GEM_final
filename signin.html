<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grand Egyptian Museum</title>
    <link rel="stylesheet" href="signin.css">
</head>

<body>

    <div class="containers">
        <h1>Sign in</h1>
            <p>Welcome back to the museum !</p>
        <div class="form-box">
            
            <form id="signin">
                <label for="email">Your Email</label>
                <input  type="email" placeholder="Email Address" required id="email">
                <label for="password">Password</label>
                <input type="password" placeholder="Password" required id="password">
                <button type="submit">Sign in</button>
            </form>

         
         <p class="line">Or sign in with</p>

        <div class="social-login">
            <button class="facebook">Facebook</button>
            <button class="google">Google</button>
        </div>



        <p class="another">
            Don't have an accout? <a href="signup.html">Sign Up</a>
        </p>

        </div>
    </div>

<script>

document.getElementById("signin").addEventListener("submit", function(e){
    e.preventDefault();

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  let savedEmail = localStorage.getItem("email");
  let savedPassword = localStorage.getItem("password");

  if(email === savedEmail && password === savedPassword){
    alert("Welcome!");
  } else {
    alert("Wrong data!");
  }
});

</script>
</body>
</html>
